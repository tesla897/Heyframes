<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #f3f0e8;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      #root {
        position: relative;
        overflow: hidden;
        background: #f3f0e8;
      }

      .slide {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        padding: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #111111;
        will-change: transform, opacity;
      }

      .frame {
        width: 100%;
        height: 100%;
        padding: 48px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: #f8f8f3;
        border: 8px solid #111111;
        border-radius: 30px;
      }

      .title {
        font-size: 78px;
        line-height: 0.98;
        font-weight: 900;
        text-align: center;
        text-transform: uppercase;
        color: #111111;
      }

      .body {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 40px;
      }

      .seal {
        position: relative;
        width: 280px;
        height: 280px;
        flex: 0 0 auto;
        border-radius: 50%;
        border: 10px solid #111111;
        background: #ffffff;
      }

      .seal::before {
        content: "";
        position: absolute;
        inset: -28px;
        border-radius: 50%;
        border: 18px solid var(--accent);
        opacity: 0.3;
      }

      .seal::after {
        content: "";
        position: absolute;
        inset: 82px;
        border-radius: 50%;
        background: var(--accent);
        border: 8px solid #111111;
      }

      .subtitle {
        max-width: 900px;
        padding: 32px 40px;
        border: 8px solid #111111;
        border-radius: 24px;
        background: #ffffff;
        font-size: 48px;
        line-height: 1.2;
        text-align: center;
      }

      .badge-wrap {
        display: flex;
        justify-content: center;
      }

      .badge {
        padding: 12px 28px;
        border: 6px solid #111111;
        border-radius: 999px;
        background: var(--accent);
        color: #111111;
        font-size: 32px;
        line-height: 1.1;
        font-weight: 700;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="8.333"
      data-width="1920"
      data-height="1080"
    >
      <section class="slide" id="slide-1" style="background: #f3f0e8; --accent: #f4c542">
        <div class="frame">
          <h1 class="title">FRESH AIR AFTER TIBERIUS</h1>
          <div class="body">
            <div class="seal"></div>
            <p class="subtitle">A new face seems like a reset for Rome.</p>
          </div>
          <div class="badge-wrap">
            <div class="badge">Remotion + Coolify Starter</div>
          </div>
        </div>
      </section>

      <section class="slide" id="slide-2" style="background: #f5f5f5; --accent: #e05454">
        <div class="frame">
          <h1 class="title">YEAR 1 GOES WRONG</h1>
          <div class="body">
            <div class="seal"></div>
            <p class="subtitle">Optimism turns into instability.</p>
          </div>
          <div class="badge-wrap">
            <div class="badge">Remotion + Coolify Starter</div>
          </div>
        </div>
      </section>

      <section class="slide" id="slide-3" style="background: #f3f0e8; --accent: #7f65d6">
        <div class="frame">
          <h1 class="title">ILLNESS OR POWER?</h1>
          <div class="body">
            <div class="seal"></div>
            <p class="subtitle">Two explanations compete to define the emperor.</p>
          </div>
          <div class="badge-wrap">
            <div class="badge">Remotion + Coolify Starter</div>
          </div>
        </div>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const slides = ["#slide-1", "#slide-2", "#slide-3"];
      const hold = 3;
      const transition = 1 / 3;
      const starts = [0, hold - transition, hold * 2 - transition * 2];

      gsap.set(slides, { x: 1920, opacity: 1 });
      gsap.set("#slide-1", { x: 0 });

      slides.forEach((selector, index) => {
        const start = starts[index];
        tl.from(`${selector} .title`, { y: 48, opacity: 0, duration: 0.8, ease: "power3.out" }, start);
        tl.from(`${selector} .body`, { y: 24, opacity: 0, duration: 0.92, ease: "power3.out" }, start + 0.2);
        tl.from(`${selector} .badge`, { scale: 0.92, opacity: 0, duration: 0.66, ease: "back.out(1.6)" }, start + 0.4);
      });

      tl.fromTo("#slide-2", { x: 1920 }, { x: 0, duration: transition, ease: "none" }, starts[1]);
      tl.to("#slide-1", { x: -180, duration: transition, ease: "none" }, starts[1]);
      tl.fromTo("#slide-3", { opacity: 0 }, { opacity: 1, duration: transition, ease: "none" }, starts[2]);
      tl.set("#slide-3", { x: 0 }, starts[2]);
      tl.to("#slide-2", { opacity: 0, duration: transition, ease: "none" }, starts[2]);
      tl.to("#slide-3", { opacity: 1, duration: 0.001 }, 8.332);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
